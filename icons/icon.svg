<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White rounded square with shadow -->
  <defs>
    <filter id="shadow" x="-5%" y="-3%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect x="24" y="20" width="464" height="464" rx="80" ry="80" fill="#fff" filter="url(#shadow)"/>
  
  <!-- Bar chart (3 bars) -->
  <rect x="130" y="240" width="56" height="120" rx="8" fill="#0A3D62"/>
  <rect x="210" y="190" width="56" height="170" rx="8" fill="#0A3D62"/>
  <rect x="290" y="140" width="56" height="220" rx="8" fill="#0A3D62"/>
  
  <!-- Upward arrow / ribbon -->
  <path d="M140 260 Q200 180 260 200 Q320 220 360 130" stroke="#0A3D62" stroke-width="12" fill="none" stroke-linecap="round"/>
  <polygon points="365,115 380,140 350,140" fill="#0A3D62"/>
  
  <!-- SANAQ text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="72" fill="#0A3D62" letter-spacing="6">SANAQ</text>
</svg>
