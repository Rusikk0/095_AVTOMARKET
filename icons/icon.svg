<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#1e40af"/>
  <g transform="translate(96,96)" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gear -->
    <circle r="28" stroke="#fff" stroke-width="5"/>
    <circle r="12" fill="#fff" stroke="none"/>
    <!-- Gear teeth -->
    <g stroke-width="8">
      <line x1="0" y1="-36" x2="0" y2="-28"/>
      <line x1="0" y1="28" x2="0" y2="36"/>
      <line x1="-36" y1="0" x2="-28" y2="0"/>
      <line x1="28" y1="0" x2="36" y2="0"/>
      <line x1="-25" y1="-25" x2="-20" y2="-20"/>
      <line x1="20" y1="20" x2="25" y2="25"/>
      <line x1="25" y1="-25" x2="20" y2="-20"/>
      <line x1="-20" y1="20" x2="-25" y2="25"/>
    </g>
    <!-- Wrench -->
    <g transform="translate(20,20) rotate(45)">
      <rect x="-4" y="-30" width="8" height="40" rx="3" fill="#fbbf24" stroke="none"/>
      <circle cx="0" cy="-30" r="10" fill="none" stroke="#fbbf24" stroke-width="5"/>
      <rect x="-7" y="8" width="14" height="6" rx="2" fill="#fbbf24" stroke="none"/>
    </g>
  </g>
  <text x="96" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#fff">АП</text>
</svg>
